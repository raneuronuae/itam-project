{% extends "admin/login.html" %}

{% block extrahead %}
    {{ block.super }}
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* মূল কন্টেইনার স্টাইল */
        .custom-auth-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
            text-align: center;
        }

        /* পাসওয়ার্ড রিসেট লিংকের স্টাইল */
        .reset-link-sec a {
            color: #495057;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            background: #f8f9fa;
            transition: all 0.3s ease;
        }

        .reset-link-sec a:hover {
            color: #007bff;
            background: #eef6ff;
            border-color: #bcdffb;
        }
    </style>
{% endblock %}

{% block content %}
    {{ block.super }}

    <div class="custom-auth-container">
        <div class="reset-link-sec">
            <a href="{% url 'account_reset_password' %}">
                <i class="fa-solid fa-key" style="margin-right: 8px;"></i> 
                পাসওয়ার্ড ভুলে গেছেন? (Forgot Password?)
            </a>
        </div>
    </div>
{% endblock %}
